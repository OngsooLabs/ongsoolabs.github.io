name: Integration Repository Access Check

on:
  workflow_dispatch:
    inputs:
      integration_ref:
        description: "Integration repository ref (branch/tag/SHA)"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  access-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Validate required secret
        env:
          INTEGRATION_READ_TOKEN: ${{ secrets.INTEGRATION_READ_TOKEN }}
        run: |
          if [ -z "$INTEGRATION_READ_TOKEN" ]; then
            echo "Missing repository secret: INTEGRATION_READ_TOKEN"
            echo "Create a fine-grained PAT with read access to OngsooLabs/Integration and store it as INTEGRATION_READ_TOKEN in this repository secrets."
            exit 1
          fi

      - name: Checkout Integration repository
        uses: actions/checkout@v4
        with:
          repository: OngsooLabs/Integration
          token: ${{ secrets.INTEGRATION_READ_TOKEN }}
          ref: ${{ inputs.integration_ref }}
          path: integration

      - name: Verify repository access
        run: |
          echo "Successfully checked out OngsooLabs/Integration@${{ inputs.integration_ref }}"
          ls -la integration | cat
