name: Build and Deploy Docs

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:
  repository_dispatch:
    types: [integration-updated]
  schedule:
    - cron: '0 2 * * 1'  # 매주 월요일 02:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4

      - name: Checkout Integration repository
        uses: actions/checkout@v4
        with:
          repository: OngsooLabs/Integration
          token: ${{ secrets.INTEGRATION_READ_TOKEN }}
          path: integration

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate API metadata from C# sources
        run: docfx metadata docfx.json
        continue-on-error: true  # Unity 에셋은 외부 빌드 환경에서 컴파일 실패 가능

      - name: Build documentation site
        run: docfx build docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
